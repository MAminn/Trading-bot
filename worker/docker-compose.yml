services:
  v22-engine:
    build: .
    container_name: v22-engine
    restart: unless-stopped
    environment:
      ENGINE_BASE_DIR: /app/runtime
      APP_API_BASE: ${APP_API_BASE}
      ENGINE_SERVICE_TOKEN: ${ENGINE_SERVICE_TOKEN}
      ENGINE_USER_ID: ${ENGINE_USER_ID}
    volumes:
      - audit:/app/runtime/model files/live_audit_v22_global_no_overlap
volumes:
  audit:
